<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>態度貳貳日記簿 - 專業會計系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            50: '#FDFBF7',
                            100: '#D7CCC8',
                            200: '#BCAAA4',
                            300: '#A1887F',
                            400: '#8D6E63',
                            500: '#6D4C41',
                            600: '#5D2E17', // 原深咖啡
                            700: '#4E342E',
                            800: '#3E2723',
                            900: '#2D1B18',
                        },
                        cream: '#FFFDF5',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFDF5; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        .group:hover img { transform: scale(1.05) !important; transition: all 0.3s ease; }
        
        /* 手機版優化：隱藏捲軸但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 手機版表格文字縮小 */
        @media (max-width: 640px) {
            .mobile-text-xs { font-size: 0.75rem; }
            .mobile-p-2 { padding: 0.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 子組件：Logo ---
        const Logo = ({ src }) => (
            <div className="relative w-20 h-20 mr-4 overflow-hidden rounded-xl border-2 border-[#d7ccc8] bg-white shadow-inner flex items-center justify-center group cursor-pointer">
                {src ? (
                    <img 
                        src={src} 
                        alt="態度貳貳 Logo" 
                        className="w-full h-full object-cover"
                    />
                ) : (
                    <div className="w-full h-full bg-[#5D2E17] text-white flex flex-col items-center justify-center font-bold text-xs p-1 text-center leading-tight">
                        <span className="text-xl mb-1">📷</span>
                        點擊上傳<br/>Logo
                    </div>
                )}
            </div>
        );

        // 預設會計科目 (Chart of Accounts)
        const INITIAL_COA = [
            { id: '1101', name: '現金', type: '資產', side: 'debit' },
            { id: '1102', name: '銀行存款', type: '資產', side: 'debit' },
            { id: '1201', name: '應收帳款', type: '資產', side: 'debit' },
            { id: '1301', name: '存貨 (材料)', type: '資產', side: 'debit' },
            { id: '2101', name: '應付帳款', type: '負債', side: 'credit' },
            { id: '3101', name: '業主資本', type: '權益', side: 'credit' },
            { id: '4101', name: '銷貨收入', type: '收入', side: 'credit' },
            { id: '5101', name: '進貨成本', type: '成本', side: 'debit' },
            { id: '6101', name: '薪資費用', type: '費用', side: 'debit' },
            { id: '6102', name: '租金費用', type: '費用', side: 'debit' },
            { id: '6103', name: '水電瓦斯費', type: '費用', side: 'debit' },
            { id: '7101', name: '利息收入', type: '營業外收入', side: 'credit' },
            { id: '8101', name: '利息費用', type: '營業外費損', side: 'debit' },
        ];

        // --- 核心計算邏輯 (共用) ---
        const calculateBalances = (entries, coa, start, end, isCutoff = false) => {
            const filtered = entries.filter(e => {
                const d = new Date(e.date);
                if (!isCutoff && start && d < start) return false;
                if (end && d > end) return false;
                return true;
            });

            const balances = {};
            coa.forEach(a => balances[a.id] = { ...a, balance: 0 });
            filtered.forEach(entry => {
                entry.lines.forEach(line => {
                    if (!balances[line.accountId]) return;
                    const account = balances[line.accountId];
                    if (account.side === 'debit') {
                        if (line.type === 'debit') account.balance += line.amount;
                        else account.balance -= line.amount;
                    } else {
                        if (line.type === 'credit') account.balance += line.amount;
                        else account.balance -= line.amount;
                    }
                });
            });
            return balances;
        };

        const getFilterRange = (filter, customDates, currentYear) => {
            let start, end;
            if (filter.type === 'month') {
                const month = parseInt(filter.value);
                start = new Date(currentYear, month - 1, 1);
                end = new Date(currentYear, month, 0);
            } else if (filter.type === 'ytd') {
                const month = parseInt(filter.value);
                start = new Date(currentYear, 0, 1);
                end = new Date(currentYear, month, 0);
            } else if (filter.type === 'full-year') {
                start = new Date(currentYear, 0, 1);
                end = new Date(currentYear, 11, 31);
            } else if (filter.type === 'custom') {
                start = customDates.start ? new Date(customDates.start) : null;
                end = customDates.end ? new Date(customDates.end) : null;
            }
            return { start, end };
        };

        function App() {
            const [selectedYear, setSelectedYear] = useState(2026);
            
            // --- 雲端同步狀態 ---
            const [cloudConfig, setCloudConfig] = useState(() => {
                const saved = localStorage.getItem('dessert_cloud_config');
                return saved ? JSON.parse(saved) : { url: '', key: '', table: 'accounting_data', userId: '' };
            });
            const [isSyncing, setIsSyncing] = useState(false);
            const [lastSyncTime, setLastSyncTime] = useState(null);
            const [isCloudModalOpen, setIsCloudModalOpen] = useState(false);

            const [allEntries, setAllEntries] = useState(() => {
                const saved = localStorage.getItem('dessert_all_entries');
                return saved ? JSON.parse(saved) : { 2026: [], 2027: [], 2028: [], 2029: [], 2030: [], 2031: [] };
            });
            const entries = useMemo(() => allEntries[selectedYear] || [], [allEntries, selectedYear]);

            const [coa, setCoa] = useState(() => {
                const saved = localStorage.getItem('dessert_coa');
                return saved ? JSON.parse(saved) : INITIAL_COA;
            });
            const [logo, setLogo] = useState(() => {
                return localStorage.getItem('dessert_logo') || '';
            });
            const [mainTab, setMainTab] = useState('accounting'); // accounting, assets
            const [view, setView] = useState('journal'); // journal, reports, coa
            const [assetsData, setAssetsData] = useState(() => {
                const saved = localStorage.getItem('dessert_assets');
                return saved ? JSON.parse(saved) : [];
            });
            const [depreciationLog, setDepreciationLog] = useState(() => {
                const saved = localStorage.getItem('dessert_dep_log');
                return saved ? JSON.parse(saved) : {}; // { "2026-3": true, "2026-4": false }
            });
            const [isExportModalOpen, setIsExportModalOpen] = useState(false);
            const [isCropperOpen, setIsCropperOpen] = useState(false);
            const [tempImage, setTempImage] = useState(null);

            useEffect(() => {
                localStorage.setItem('dessert_all_entries', JSON.stringify(allEntries));
            }, [allEntries]);

            useEffect(() => {
                localStorage.setItem('dessert_coa', JSON.stringify(coa));
            }, [coa]);

            useEffect(() => {
                localStorage.setItem('dessert_assets', JSON.stringify(assetsData));
            }, [assetsData]);

            useEffect(() => {
                localStorage.setItem('dessert_dep_log', JSON.stringify(depreciationLog));
            }, [depreciationLog]);

            useEffect(() => {
                if (logo) localStorage.setItem('dessert_logo', logo);
            }, [logo]);

            useEffect(() => {
                localStorage.setItem('dessert_cloud_config', JSON.stringify(cloudConfig));
            }, [cloudConfig]);

            // --- 雲端同步邏輯 ---
            const supabaseClient = useMemo(() => {
                if (!cloudConfig.url || !cloudConfig.key) return null;
                try {
                    return supabase.createClient(cloudConfig.url, cloudConfig.key);
                } catch (e) {
                    console.error('Supabase init error:', e);
                    return null;
                }
            }, [cloudConfig.url, cloudConfig.key]);

            const pushToCloud = async (forceData = null) => {
                if (!supabaseClient || !cloudConfig.userId) return;
                setIsSyncing(true);
                const dataToSync = forceData || {
                    allEntries,
                    coa,
                    assetsData,
                    depreciationLog,
                    logo,
                    lastUpdated: new Date().toISOString()
                };
                
                try {
                    const { error } = await supabaseClient
                        .from(cloudConfig.table)
                        .upsert({ 
                            id: cloudConfig.userId, 
                            content: dataToSync,
                            updated_at: new Date().toISOString()
                        });
                    
                    if (!error) {
                        setLastSyncTime(new Date().toLocaleTimeString());
                    } else {
                        console.error('Push error:', error);
                        alert('同步失敗: ' + error.message);
                    }
                } catch (e) {
                    console.error('Cloud push failed:', e);
                } finally {
                    setIsSyncing(false);
                }
            };

            const pullFromCloud = async () => {
                if (!supabaseClient || !cloudConfig.userId) return;
                setIsSyncing(true);
                try {
                    const { data, error } = await supabaseClient
                        .from(cloudConfig.table)
                        .select('content')
                        .eq('id', cloudConfig.userId)
                        .single();
                    
                    if (data && data.content) {
                        const c = data.content;
                        if (c.allEntries) setAllEntries(c.allEntries);
                        if (c.coa) setCoa(c.coa);
                        if (c.assetsData) setAssetsData(c.assetsData);
                        if (c.depreciationLog) setDepreciationLog(c.depreciationLog);
                        if (c.logo) setLogo(c.logo);
                        setLastSyncTime(new Date().toLocaleTimeString());
                        alert('已從雲端同步最新資料！');
                    } else if (error && error.code === 'PGRST116') {
                        // 沒資料，先推上去
                        pushToCloud();
                    } else if (error) {
                        console.error('Pull error:', error);
                        alert('下載失敗: ' + error.message);
                    }
                } catch (e) {
                    console.error('Cloud pull failed:', e);
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (re) => {
                        setTempImage(re.target.result);
                        setIsCropperOpen(true);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const addEntry = (newEntry) => {
                setAllEntries(prev => ({
                    ...prev,
                    [selectedYear]: [newEntry, ...(prev[selectedYear] || [])]
                }));
            };

            const updateEntry = (updatedEntry) => {
                setAllEntries(prev => ({
                    ...prev,
                    [selectedYear]: (prev[selectedYear] || []).map(e => e.id === updatedEntry.id ? updatedEntry : e)
                }));
            };

            const deleteEntry = (id) => {
                if (confirm('確定要刪除這筆傳票嗎？此動作無法復原！')) {
                    setAllEntries(prev => ({
                        ...prev,
                        [selectedYear]: (prev[selectedYear] || []).filter(e => e.id !== id)
                    }));
                }
            };

            const addCoa = (newCoa) => {
                if (coa.some(a => a.id === newCoa.id)) {
                    alert('會計科目編號已存在！');
                    return false;
                }
                setCoa([...coa, newCoa].sort((a, b) => a.id.localeCompare(b.id)));
                return true;
            };

            const updateCoa = (updatedCoa) => {
                setCoa(coa.map(a => a.id === updatedCoa.id ? updatedCoa : a));
            };

            const deleteCoa = (id) => {
                const isUsed = Object.values(allEntries).flat().some(entry => entry.lines.some(line => line.accountId === id));
                if (isUsed) {
                    alert('此科目已有交易紀錄，無法刪除！');
                    return;
                }
                if (confirm('確定要刪除此會計科目嗎？')) {
                    setCoa(coa.filter(a => a.id !== id));
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-5xl mx-auto mb-8">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 pb-6 border-b border-coffee-100">
                            <div className="flex items-center">
                                <label className="cursor-pointer">
                                    <Logo src={logo} />
                                    <input 
                                        type="file" 
                                        className="hidden" 
                                        accept="image/*"
                                        onChange={handleLogoUpload}
                                    />
                                </label>
                                <div>
                                    <h1 className="text-3xl font-bold text-coffee-600 drop-shadow-sm">
                                        {mainTab === 'accounting' ? '態度貳貳日記簿' : '態度貳貳資產總表'}
                                    </h1>
                                    <p className="text-gray-500 text-sm">
                                        {mainTab === 'accounting' ? '正式會計簿記 · 甜點店專屬' : '固定資產管理 · 折舊自動計算'}
                                    </p>
                                </div>
                            </div>

                            <div className="flex bg-coffee-50 p-1 rounded-2xl border border-coffee-100 shadow-inner">
                                <button 
                                    onClick={() => setMainTab('accounting')}
                                    className={`px-6 py-2.5 rounded-xl transition-all duration-300 font-bold flex items-center gap-2 ${mainTab === 'accounting' ? 'bg-coffee-600 text-white shadow-lg scale-105' : 'text-coffee-400 hover:text-coffee-600'}`}
                                >
                                    <span>📝</span> 記帳系統
                                </button>
                                <button 
                                    onClick={() => setMainTab('assets')}
                                    className={`px-6 py-2.5 rounded-xl transition-all duration-300 font-bold flex items-center gap-2 ${mainTab === 'assets' ? 'bg-coffee-600 text-white shadow-lg scale-105' : 'text-coffee-400 hover:text-coffee-600'}`}
                                >
                                    <span>⚖️</span> 資產總表
                                </button>
                            </div>
                        </div>

                        {mainTab === 'accounting' && (
                            <div className="flex flex-wrap justify-between items-center gap-4 animate-fade-in">
                                <nav className="flex bg-white p-1 rounded-xl shadow-sm border border-coffee-100 overflow-x-auto no-scrollbar max-w-full">
                                    <button 
                                        onClick={() => setView('journal')}
                                        className={`px-4 py-2 rounded-lg transition text-sm font-medium whitespace-nowrap ${view === 'journal' ? 'bg-coffee-600 text-white shadow-md' : 'text-coffee-400 hover:bg-coffee-50'}`}
                                    >
                                        日記簿
                                    </button>
                                    <button 
                                        onClick={() => setView('reports')}
                                        className={`px-4 py-2 rounded-lg transition text-sm font-medium whitespace-nowrap ${view === 'reports' ? 'bg-coffee-600 text-white shadow-md' : 'text-coffee-400 hover:bg-coffee-50'}`}
                                    >
                                        財務報表
                                    </button>
                                    <button 
                                        onClick={() => setView('coa')}
                                        className={`px-4 py-2 rounded-lg transition text-sm font-medium whitespace-nowrap ${view === 'coa' ? 'bg-coffee-600 text-white shadow-md' : 'text-coffee-400 hover:bg-coffee-50'}`}
                                    >
                                        會計科目
                                    </button>
                                    <button 
                                        onClick={() => setView('ledger')}
                                        className={`px-4 py-2 rounded-lg transition text-sm font-medium whitespace-nowrap ${view === 'ledger' ? 'bg-coffee-600 text-white shadow-md' : 'text-coffee-400 hover:bg-coffee-50'}`}
                                    >
                                        分類帳
                                    </button>
                                </nav>
                                <div className="flex items-center gap-3">
                                    <div className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl border border-coffee-100 shadow-sm">
                                        <span className="text-xs font-bold text-coffee-400">當前年度:</span>
                                        <select 
                                            value={selectedYear} 
                                            onChange={(e) => setSelectedYear(Number(e.target.value))}
                                            className="bg-transparent text-sm font-bold text-coffee-600 outline-none cursor-pointer"
                                        >
                                            {[2026, 2027, 2028, 2029, 2030, 2031].map(y => (
                                                <option key={y} value={y}>{y} 年度</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => setIsCloudModalOpen(true)}
                                            className={`p-2 rounded-lg border shadow-sm font-medium flex items-center gap-2 transition ${cloudConfig.url ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-white text-gray-400 border-gray-200 hover:bg-gray-50'}`}
                                            title="雲端同步設定"
                                        >
                                            {isSyncing ? '🔄' : (cloudConfig.url ? '☁️' : '☁️?')} 同步
                                        </button>
                                        <button 
                                            onClick={() => setIsExportModalOpen(true)}
                                            className="p-2 bg-coffee-600 text-white rounded-lg border border-coffee-700 hover:bg-coffee-700 shadow-sm font-medium flex items-center gap-2"
                                            title="匯出報表與資料"
                                        >
                                            📥 匯出
                                        </button>
                                        <label className="p-2 bg-white text-gray-500 rounded-lg border border-gray-200 hover:bg-gray-50 shadow-sm cursor-pointer" title="匯入備份">
                                            📤 匯入
                                            <input 
                                                type="file" 
                                                className="hidden" 
                                                accept=".json"
                                                onChange={(e) => {
                                                    const file = e.target.files[0];
                                                    if (file) {
                                                        const reader = new FileReader();
                                                        reader.onload = (re) => {
                                                            try {
                                                                const imported = JSON.parse(re.target.result);
                                                                if (typeof imported === 'object' && !Array.isArray(imported)) {
                                                                    setAllEntries(imported);
                                                                    alert('匯入成功！');
                                                                } else if (Array.isArray(imported)) {
                                                                    // 相容舊格式
                                                                    setAllEntries({ ...allEntries, [selectedYear]: imported });
                                                                    alert('匯入成功（已存入當前年度）！');
                                                                }
                                                            } catch (err) {
                                                                alert('檔案格式錯誤');
                                                            }
                                                        };
                                                        reader.readAsText(file);
                                                    }
                                                }}
                                            />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        )}
                    </header>

                    <main className="max-w-5xl mx-auto">
                        {mainTab === 'accounting' ? (
                            <>
                                {view === 'journal' && <JournalView entries={entries} coa={coa} onAddEntry={addEntry} onUpdateEntry={updateEntry} onDeleteEntry={deleteEntry} selectedYear={selectedYear} onAddAsset={(a) => setAssetsData(prev => [...prev, a])} />}
                                {view === 'reports' && <ReportsView allEntries={allEntries} coa={coa} selectedYear={selectedYear} />}
                                {view === 'ledger' && <LedgerView allEntries={allEntries} coa={coa} />}
                                {view === 'coa' && <CoaView coa={coa} onAddCoa={addCoa} onUpdateCoa={updateCoa} onDeleteCoa={deleteCoa} />}
                            </>
                        ) : (
                            <AssetsView 
                                assets={assetsData} 
                                setAssets={setAssetsData} 
                                selectedYear={selectedYear} 
                                setSelectedYear={setSelectedYear} 
                                depreciationLog={depreciationLog}
                                setDepreciationLog={setDepreciationLog}
                            />
                        )}
                    </main>

                    {isExportModalOpen && (
                        <ExportModal 
                            onClose={() => setIsExportModalOpen(false)} 
                            allEntries={allEntries} 
                            coa={coa} 
                            selectedYear={selectedYear}
                        />
                    )}

                    {isCloudModalOpen && (
                        <CloudSyncModal 
                            config={cloudConfig} 
                            setConfig={setCloudConfig} 
                            onClose={() => setIsCloudModalOpen(false)} 
                            onPush={() => pushToCloud()}
                            onPull={pullFromCloud}
                            isSyncing={isSyncing}
                            lastSyncTime={lastSyncTime}
                        />
                    )}

                    {isCropperOpen && (
                        <LogoCropper 
                            image={tempImage} 
                            onCrop={(cropped) => {
                                setLogo(cropped);
                                setIsCropperOpen(false);
                            }}
                            onCancel={() => setIsCropperOpen(false)}
                        />
                    )}
                </div>
            );
        }

        // --- 子組件：雲端同步設定 ---
        function CloudSyncModal({ config, setConfig, onClose, onPush, onPull, isSyncing, lastSyncTime }) {
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-fade-in-up">
                        <div className="p-4 border-b flex justify-between items-center bg-emerald-50">
                            <h3 className="font-bold text-emerald-700 flex items-center gap-2">
                                <span>☁️</span> 雲端即時同步設定
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
                        </div>
                        <div className="p-6 space-y-4">
                            <div className="bg-amber-50 border border-amber-200 p-3 rounded-xl text-xs text-amber-700 leading-relaxed">
                                💡 此功能目前支援 <strong>Supabase</strong> 雲端資料庫。設定完成後，不同電腦、手機點開網頁即可即時同步資料。
                            </div>
                            
                            <div className="space-y-3">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1 uppercase">Supabase URL</label>
                                    <input 
                                        type="text" 
                                        value={config.url} 
                                        onChange={e => setConfig({...config, url: e.target.value})}
                                        className="w-full border rounded-lg p-2 text-sm font-mono"
                                        placeholder="https://xxx.supabase.co"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1 uppercase">Anon Key</label>
                                    <input 
                                        type="password" 
                                        value={config.key} 
                                        onChange={e => setConfig({...config, key: e.target.value})}
                                        className="w-full border rounded-lg p-2 text-sm font-mono"
                                        placeholder="eyJhbGciOiJIUzI1NiIsInR..."
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 mb-1 uppercase">店舖專屬 ID (建議設為手機號碼)</label>
                                    <input

        // --- 子組件：Logo 裁切器 ---
        function LogoCropper({ image, onCrop, onCancel }) {
            const [pos, setPos] = useState({ x: 50, y: 50, scale: 1.5 });
            const imgRef = React.useRef(null);
            const containerRef = React.useRef(null);

            const handleWheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                setPos(prev => ({ ...prev, scale: Math.max(0.5, Math.min(5, prev.scale + delta)) }));
            };

            const handleMouseMove = (e) => {
                if (e.buttons !== 1) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                setPos(prev => ({ ...prev, x, y }));
            };

            const doCrop = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 400;
                const ctx = canvas.getContext('2d');
                
                const img = imgRef.current;
                const cw = 400;
                const ch = 400;
                
                // 計算裁切區域
                const scale = pos.scale;
                const iw = img.naturalWidth;
                const ih = img.naturalHeight;
                
                // 模擬 object-cover 的計算
                const ratio = Math.max(cw / iw, ch / ih) * scale;
                const dw = iw * ratio;
                const dh = ih * ratio;
                
                const dx = (cw / 2) - (pos.x / 100) * dw;
                const dy = (ch / 2) - (pos.y / 100) * dh;

                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, 400, 400);
                ctx.drawImage(img, dx, dy, dw, dh);
                
                onCrop(canvas.toDataURL('image/png'));
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden animate-fade-in-up">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                            <h3 className="font-bold text-gray-700">調整 Logo 顯示區域</h3>
                            <button onClick={onCancel} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
                        </div>
                        
                        <div className="p-8 flex flex-col items-center">
                            <div className="mb-6 text-sm text-gray-500 text-center">
                                🖱️ 使用滑鼠滾輪縮放，按住左鍵拖動圖片位置<br/>
                                <span className="text-coffee-600 font-medium">清楚無遮蔽的區域為最終顯示範圍</span>
                            </div>

                            {/* 裁切預覽區 */}
                            <div 
                                ref={containerRef}
                                className="relative w-64 h-64 border-4 border-coffee-600 rounded-xl overflow-hidden cursor-move bg-gray-200 shadow-2xl"
                                onWheel={handleWheel}
                                onMouseMove={handleMouseMove}
                            >
                                <img 
                                    ref={imgRef}
                                    src={image} 
                                    className="absolute max-none pointer-events-none"
                                    style={{
                                        width: `${pos.scale * 100}%`,
                                        height: 'auto',
                                        top: `${pos.y}%`,
                                        left: `${pos.x}%`,
                                        transform: 'translate(-50%, -50%)',
                                        transition: 'none'
                                    }}
                                />
                                {/* 遮罩層：中間方形透明，四周半透明灰色 */}
                                <div className="absolute inset-0 pointer-events-none ring-[100px] ring-black ring-opacity-40"></div>
                            </div>

                            <div className="mt-8 flex gap-4 w-full">
                                <button onClick={onCancel} className="flex-1 py-3 border-2 border-gray-200 rounded-xl font-bold text-gray-500 hover:bg-gray-50">取消</button>
                                <button onClick={doCrop} className="flex-1 py-3 bg-[#5D2E17] text-white rounded-xl font-bold hover:bg-[#3E1C0D] shadow-lg">確認裁切並儲存</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 子組件 ---

        function JournalView({ entries, coa, onAddEntry, selectedYear, onAddAsset, onUpdateEntry, onDeleteEntry }) {
            const [showForm, setShowForm] = useState(false);
            const [editingEntryId, setEditingEntryId] = useState(null);
            const [pendingAssets, setPendingAssets] = useState([]);
            const [currentPendingAsset, setCurrentPendingAsset] = useState(null);

            const handleSaveEntry = (entry) => {
                onAddEntry(entry);
                setShowForm(false);
                
                const equipmentKeywords = [
                    { key: '生財設備', cat: '生財設備' },
                    { key: '租賃物改良', cat: '裝修工程' },
                    { key: '裝修工程', cat: '裝修工程' },
                    { key: '運輸設備', cat: '運輸設備' },
                    { key: '辦公設備', cat: '辦公設備' }
                ];
                
                const matchedAssets = [];
                
                entry.lines.forEach(line => {
                    if (line.type === 'debit') {
                        for (let eq of equipmentKeywords) {
                            if (line.accountName.includes(eq.key)) {
                                matchedAssets.push({
                                    id: crypto.randomUUID(),
                                    status: '使用中',
                                    category: eq.cat,
                                    name: line.lineDescription || entry.description || eq.cat,
                                    purchaseDate: entry.date,
                                    totalCost: line.amount,
                                    quantity: 1,
                                    usefulLife: 5,
                                    residualValue: 0,
                                    remark: `憑證: ${entry.id}`
                                });
                                break;
                            }
                        }
                    }
                });

                if (matchedAssets.length > 0) {
                    setPendingAssets(matchedAssets);
                    setCurrentPendingAsset(matchedAssets[0]);
                }
            };

            const handleSaveAsset = () => {
                if (onAddAsset && currentPendingAsset) onAddAsset(currentPendingAsset);
                handleSkipAsset();
            };

            const handleSkipAsset = () => {
                const nextQueue = pendingAssets.slice(1);
                setPendingAssets(nextQueue);
                if (nextQueue.length > 0) {
                    setCurrentPendingAsset(nextQueue[0]);
                } else {
                    setCurrentPendingAsset(null);

                                    </tr>

                                    entries.map(entry => (
                                        <React.Fragment key={entry.id}>
                                            {editingEntryId === entry.id ? (
                                                <tr>
                                                    <td colSpan="7" className="p-0 border-b">
                                                        <div className="bg-amber-50 p-6 border-l-4 border-amber-400">
                                                            <div className="flex justify-between items-center mb-4 text-amber-800 font-bold">
                                                                <h4>正在編輯傳票 #{entry.id}</h4>
                                                            </div>
                                                            <EntryForm 
                                                                coa={coa} 
                                                                entries={entries} 
                                                                selectedYear={selectedYear}
                                                                initialData={entry}
                                                                onSave={(updatedEntry) => { onUpdateEntry(updatedEntry); setEditingEntryId(null); }}
                                                                onCancel={() => setEditingEntryId(null)}

                                                    <tr key={`${entry.id}-${idx}`} className="border-b last:border-b-0 hover:bg-gray-50 group">
                                                        {idx === 0 && (

                                                        <td className={`p-4 ${line.type === 'credit' ? 'pl-12' : 'pl-4'}`}>

                                                            {line.lineDescription || ''}

                                                            {line.type === 'debit' ? line.amount.toLocaleString() : ''}
                                                        </td>

                                                            {line.type === 'credit' ? line.amount.toLocaleString() : ''}
                                                        </td>

                                                                    <button onClick={() => onDeleteEntry(entry.id)} className="px-3 py-1 text-xs bg-white text-red-500 border border-red-200 rounded hover:bg-red-50 shadow-sm font-bold w-full">刪除</button>
                                                                </div>
                                                            </td>
                                                        )}

                                                ))
                                            )}

                            </tbody>
                        </table>
                    </div>

                    {currentPendingAsset && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 animate-fade-in">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full overflow-hidden animate-fade-in-up">
                                <div className="p-4 border-b flex justify-between items-center bg-coffee-50">
                                    <h3 className="font-bold text-coffee-700 flex items-center gap-2">
                                        <span>✨</span> 新增至資產總表?
                                    </h3>
                                </div>
                                <div className="p-6 space-y-4">
                                    <p className="text-sm text-gray-600 font-medium">偵測到借方有「{currentPendingAsset.category}」相關的支出，要順便加入資產總表以便日後自動計算折舊嗎？</p>
                                    
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1">資產名稱 (來自摘要)</label>
                                        <input 
                                            type="text" 
                                            value={currentPendingAsset.name} 
                                            onChange={e => setCurrentPendingAsset({...currentPendingAsset, name: e.target.value})}
                                            className="w-full border p-2 rounded focus:ring-2 focus:ring-coffee-300 outline-none font-bold text-coffee-700"

                                    <div className="grid grid-cols-2 gap-4">

        }

        function EntryForm({ coa, entries, onSave, selectedYear, initialData, onCancel }) {
            const [date, setDate] = useState(initialData?.date || '');
            const [description, setDescription] = useState(initialData?.description || '');
            const [lines, setLines] = useState(initialData?.lines || [
                { accountId: '', amount: 0, type: 'debit', lineDescription: '' },
                { accountId: '', amount: 0, type: 'credit', lineDescription: '' }
            ]);

            useEffect(() => {
                if (!initialData) {
                    const today = new Date();
                    const mm = String(today.getMonth() + 1).padStart(2, '0');
                    const dd = String(today.getDate()).padStart(2, '0');
                    setDate(`${selectedYear}-${mm}-${dd}`);
                }
            }, [selectedYear, initialData]);

            const totalDebit = lines.filter(l => l.type === 'debit').reduce((sum, l) => sum + Number(l.amount), 0);
            const totalCredit = lines.filter(l => l.type === 'credit').reduce((sum, l) => sum + Number(l.amount), 0);
            const isBalanced = totalDebit === totalCredit && totalDebit > 0;

            const generateVoucherId = (selectedDate) => {
                // 格式：YYMMDDNN (前兩碼西元後兩位, 再來月份兩碼, 日期兩碼, 最後2碼序號)
                const d = new Date(selectedDate);
                const yy = String(d.getFullYear()).slice(-2);
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const datePrefix = `${yy}${mm}${dd}`;

                // 找當天現有的最大序號
                const todayVouchers = entries
                    .filter(e => e.date === selectedDate)
                    .map(e => e.id)
                    .filter(id => id.startsWith(datePrefix));
                
                let nextSeq = 1;
                if (todayVouchers.length > 0) {
                    const maxSeq = Math.max(...todayVouchers.map(id => parseInt(id.slice(-2), 10)));
                    nextSeq = maxSeq + 1;
                }

                return `${datePrefix}${String(nextSeq).padStart(2, '0')}`;
            };

            const handleLineChange = (index, field, value) => {
                const newLines = [...lines];
                newLines[index][field] = value;
                setLines(newLines);
            };

            const addLine = (type) => {
                const newLine = { accountId: '', amount: 0, type, lineDescription: '' };
                const newLines = [...lines];
                
                let insertIdx = newLines.length;
                for (let i = newLines.length - 1; i >= 0; i--) {
                    if (newLines[i].type === type) {
                        insertIdx = i + 1;
                        break;
                    }
                }
                // 若新增借方且目前無借方時，直接加在第一行
                if (type === 'debit' && insertIdx === newLines.length && !newLines.some(l => l.type === 'debit')) {
                    insertIdx = 0;
                }
                
                newLines.splice(insertIdx, 0, newLine);
                setLines(newLines);
            };

            const removeLine = (index) => {
                if (lines.length > 2) {
                    setLines(lines.filter((_, i) => i !== index));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!isBalanced) return;

                const voucherId = initialData ? initialData.id : generateVoucherId(date);

                const entry = {
                    id: voucherId,
                    date,
                    description,
                    lines: lines.map(l => ({
                        ...l,
                        accountName: coa.find(a => a.id === l.accountId)?.name || '未知名稱'
                    }))
                };
                onSave(entry);
            };

            return (
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label className="block text-sm font-medium text-gray-600 mb-1">交易日期</label>
                            <input 
                                type="date" 
                                value={date} 
                                onChange={e => setDate(e.target.value)}
                                className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-coffee-300 outline-none"
                                required
                            />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-600 mb-1">總摘要</label>
                            <input 
                                type="text" 
                                value={description} 
                                onChange={e => setDescription(e.target.value)}
                                placeholder="例如：購買麵粉、今日營收..."
                                className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-coffee-300 outline-none"
                                required
                            />
                        </div>
                    </div>

                    <div className="space-y-2">
                        <div className="grid grid-cols-12 gap-2 text-sm font-bold text-gray-500 uppercase tracking-wider px-2">
                            <div className="col-span-4">會計科目</div>
                            <div className="col-span-3">摘要</div>
                            <div className="col-span-2 text-right">借方金額</div>
                            <div className="col-span-2 text-right">貸方金額</div>
                        </div>
                        
                        {lines.map((line, idx) => (
                            <div key={idx} className="grid grid-cols-12 gap-2 items-center bg-gray-50 p-2 rounded-lg">
                                <div className="col-span-4 flex gap-1">
                                    <input 
                                        type="text"
                                        placeholder="代碼"
                                        value={line.accountId}
                                        onChange={e => handleLineChange(idx, 'accountId', e.target.value)}
                                        className="w-16 border rounded p-2 text-sm font-mono text-center focus:ring-2 focus:ring-coffee-300 outline-none placeholder-gray-300"
                                        title="輸入科目代碼"
                                    />
                                    <select 
                                        value={line.accountId} 
                                        onChange={e => handleLineChange(idx, 'accountId', e.target.value)}
                                        className="flex-1 w-0 border rounded p-2 bg-white text-sm focus:ring-2 focus:ring-coffee-300 outline-none truncate"
                                        required
                                    >
                                        <option value="" className="text-gray-400">選擇科目...</option>
                                        {coa.map(a => <option key={a.id} value={a.id}>{a.id} {a.name}</option>)}
                                    </select>
                                </div>
                                
                                <div className="col-span-3">
                                    <input 
                                        type="text" 
                                        value={line.lineDescription} 
                                        onChange={e => handleLineChange(idx, 'lineDescription', e.target.value)}
                                        placeholder="行摘要..."
                                        className="w-full border rounded p-2 text-sm"
                                    />
                                </div>

                                <div className="col-span-2">
                                    <input 
                                        type="number" 
                                        value={line.amount || ''} 
                                        onChange={e => handleLineChange(idx, 'amount', Number(e.target.value))}
                                        placeholder={line.type === 'debit' ? '借方' : '貸方'}
                                        className={`w-full border rounded p-2 text-right text-sm ${line.type === 'debit' ? 'border-blue-200' : 'border-red-200'}`}
                                        required
                                    />
                                </div>

        function LedgerView({ allEntries, coa }) {
            const [selectedAccountId, setSelectedAccountId] = useState('');
            
            const years = Object.keys(allEntries).map(Number).sort();
            const cumulativeEntries = years.flatMap(y => allEntries[y]);
            
            const accountInfo = coa.find(a => a.id === selectedAccountId);
            
            const relevantLines = useMemo(() => {
                const lines = [];
                let runningBalance = 0;
                if (!accountInfo) return lines;

                const sortedEntries = [...cumulativeEntries].sort((a, b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    return a.id.localeCompare(b.id);
                });

                sortedEntries.forEach(entry => {
                    entry.lines.forEach(line => {
                        if (line.accountId === selectedAccountId) {
                            const isDebit = line.type === 'debit';
                            const amount = Number(line.amount) || 0;
                            
                            if (accountInfo.side === 'debit') {
                                runningBalance += isDebit ? amount : -amount;
                            } else {
                                runningBalance += isDebit ? -amount : amount;
                            }

                            lines.push({
                                date: entry.date,
                                voucherId: entry.id,
                                description: entry.description,
                                lineDescription: line.lineDescription,
                                debit: isDebit ? amount : 0,
                                credit: !isDebit ? amount : 0,
                                balance: runningBalance
                            });
                        }
                    });
                });
                return lines;
            }, [selectedAccountId, accountInfo, cumulativeEntries]);

            return (
                <div className="card p-6 border border-coffee-100 animate-fade-in mb-8">
                    <div className="flex justify-between items-start mb-4 border-b pb-2">
                        <h3 className="text-xl font-bold text-coffee-700">分類帳 (Ledger)</h3>
                    </div>
                    
                    <div className="mb-6">
                        <label className="block text-sm font-medium text-gray-600 mb-2">選擇會計科目</label>
                        <select 
                            value={selectedAccountId} 
                            onChange={e => setSelectedAccountId(e.target.value)}
                            className="w-full md:w-1/2 border rounded-xl p-3 focus:ring-2 focus:ring-coffee-300 outline-none shadow-sm bg-gray-50"
                        >
                            <option value="">請選擇科目...</option>
                            {coa.map(a => <option key={a.id} value={a.id}>{a.id} {a.name}</option>)}
                        </select>
                    </div>

                    {selectedAccountId && accountInfo ? (
                        <div className="overflow-x-auto rounded-xl border border-gray-200">
                            <div className="p-4 bg-gray-50 border-b border-gray-200 text-sm text-gray-700 flex flex-wrap gap-4 justify-between items-center font-medium">
                                <div>
                                    <span>選定科目: <span className="font-bold text-coffee-700 text-base">{accountInfo.id} {accountInfo.name}</span></span>
                                    <span className="text-xs px-2 py-1 bg-white rounded border border-gray-200 text-gray-500 inline-block ml-3">{accountInfo.type}</span>
                                </div>
                                <span className="bg-white px-3 py-1 rounded-md border border-gray-200">正常餘額: <span className="text-coffee-600">{accountInfo.side === 'debit' ? '借方 (Debit)' : '貸方 (Credit)'}</span></span>
                            </div>
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="bg-gray-100 text-gray-600">
                                    <tr>
                                        <th className="p-3 border-b border-gray-200 font-semibold whitespace-nowrap">日期</th>
                                        <th className="p-3 border-b border-gray-200 font-semibold whitespace-nowrap">傳票編號</th>
                                        <th className="p-3 border-b border-gray-200 font-semibold min-w-[120px]">總摘要</th>
                                        <th className="p-3 border-b border-gray-200 font-semibold min-w-[120px]">明細摘要</th>
                                        <th className="p-3 border-b border-gray-200 font-semibold text-right whitespace-nowrap">借方金額</th>
                                        <th className="p-3 border-b border-gray-200 font-semibold text-right whitespace-nowrap">貸方金額</th>
                                        <th className="p-3 border-b border-gray-200 font-semibold text-right whitespace-nowrap">餘額</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {relevantLines.length > 0 ? (
                                        relevantLines.map((line, idx) => (
                                            <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50 transition">
                                                <td className="p-3 text-gray-600 whitespace-nowrap">{line.date}</td>
                                                <td className="p-3 font-mono text-xs text-coffee-600 whitespace-nowrap">{line.voucherId}</td>
                                                <td className="p-3">{line.description}</td>
                                                <td className="p-3 text-gray-500 italic">{line.lineDescription}</td>
                                                <td className="p-3 text-right font-mono text-gray-700">{line.debit ? line.debit.toLocaleString() : ''}</td>
                                                <td className="p-3 text-right font-mono text-gray-700">{line.credit ? line.credit.toLocaleString() : ''}</td>
                                                <td className="p-3 text-right font-mono font-bold text-coffee-700">{line.balance.toLocaleString()}</td>
                                            </tr>
                                        ))
                                    ) : (
                                        <tr>
                                            <td colSpan="7" className="p-8 text-center text-gray-400">目前沒有此科目的交易紀錄</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="p-8 text-center text-gray-400 bg-gray-50 rounded-xl border border-dashed border-gray-200">
                            請先從上方選擇一個會計科目，以查看其明細分類帳
                        </div>
                    )}
                </div>
            );
        }

        function ReportsView({ allEntries, coa, selectedYear }) {
            const [activeReport, setActiveReport] = useState('is');
            const [hideZeroBalances, setHideZeroBalances] = useState(false);
            const [isFilter, setIsFilter] = useState({ type: 'month', value: String(new Date().getMonth() + 1) });
            const [isCustomDates, setIsCustomDates] = useState({ start: '', end: '' });
            const [bsFilter, setBsFilter] = useState({ type: 'all', value: '' });
            const [bsCustomDates, setBsCustomDates] = useState({ start: '', end: '' });
            const [cfFilter, setCfFilter] = useState({ type: 'full-year', value: '' });
            const [cfCustomDates, setCfCustomDates] = useState({ start: '', end: '' });

            const currentYear = selectedYear;

            // 損益表 (IS) 的資料與計算 - 僅限當前年度
            const isLedger = useMemo(() => {
                const entries = allEntries[selectedYear] || [];
                const { start, end } = getFilterRange(isFilter, isCustomDates, currentYear);
                return calculateBalances(entries, coa, start, end);
            }, [allEntries, coa, isFilter, isCustomDates, currentYear, selectedYear]);

            // 資產負債表 (BS) 的資料與計算 - 自動結轉：包含當前年度及之前所有年度的資料
            const bsLedger = useMemo(() => {
                const years = Object.keys(allEntries).map(Number).filter(y => y <= selectedYear).sort();
                const cumulativeEntries = years.flatMap(y => allEntries[y]);
                const { end } = getFilterRange(bsFilter, bsCustomDates, currentYear);
                return calculateBalances(cumulativeEntries, coa, null, end, true);
            }, [allEntries, coa, bsFilter, bsCustomDates, currentYear, selectedYear]);

            // 損益表各項數值
            let revenue = Object.values(isLedger).filter(a => a.type === '收入');
            let cost = Object.values(isLedger).filter(a => a.type === '成本');
            let expense = Object.values(isLedger).filter(a => a.type === '費用');
            let nonOpRevenue = Object.values(isLedger).filter(a => a.type === '營業外收入');
            let nonOpExpense = Object.values(isLedger).filter(a => a.type === '營業外費損');

            const grossProfit = revenue.reduce((sum, a) => sum + a.balance, 0) - cost.reduce((sum, a) => sum + a.balance, 0);
            const opIncome = grossProfit - expense.reduce((sum, a) => sum + a.balance, 0);
            const isNetIncome = opIncome + nonOpRevenue.reduce((sum, a) => sum + a.balance, 0) - nonOpExpense.reduce((sum, a) => sum + a.balance, 0);

            // 資產負債表各項數值 (BS 淨利應包含歷史累積至今的所有損益科目餘額)
            const assets = Object.values(bsLedger).filter(a => a.type === '資產');
            let currentAssets = assets.filter(a => a.id.startsWith('11') || a.id.startsWith('12') || a.id.startsWith('13'));
            let nonCurrentAssets = assets.filter(a => a.id.startsWith('14') || a.id.startsWith('15'));
            let otherAssets = assets.filter(a => !a.id.startsWith('11') && !a.id.startsWith('12') && !a.id.startsWith('13') && !a.id.startsWith('14') && !a.id.startsWith('15'));
            let liabilities = Object.values(bsLedger).filter(a => a.type === '負債');
            let equity = Object.values(bsLedger).filter(a => a.type === '權益');
            const bsNetIncome = Object.values(bsLedger).filter(a => ['收入', '成本', '費用', '營業外收入', '營業外費損'].includes(a.type))
                .reduce((sum, a) => {
                    if (a.side === 'credit') return sum + a.balance;
                    return sum - a.balance;
                }, 0);

            const totalAssets = assets.reduce((sum, a) => sum + a.balance, 0);
            const totalLiabilities = liabilities.reduce((sum, a) => sum + a.balance, 0);
            const totalEquity = equity.reduce((sum, a) => sum + a.balance, 0);

            if (hideZeroBalances) {
                const f = arr => arr.filter(a => a.balance !== 0);
                revenue = f(revenue);
                cost = f(cost);
                expense = f(expense);
                nonOpRevenue = f(nonOpRevenue);
                nonOpExpense = f(nonOpExpense);
                currentAssets = f(currentAssets);
                nonCurrentAssets = f(nonCurrentAssets);
                otherAssets = f(otherAssets);
                liabilities = f(liabilities);
                equity = f(equity);
            }

            const cfData = useMemo(() => {
                const { start, end } = getFilterRange(cfFilter, cfCustomDates, currentYear);
                const periodStart = start || new Date(currentYear, 0, 1);
                const periodEnd = end || new Date(currentYear, 11, 31);
                
                const startBalDate = new Date(periodStart);
                startBalDate.setDate(startBalDate.getDate() - 1);
                
                const years = Object.keys(allEntries).map(Number).filter(y => y <= selectedYear).sort();
                const cumulativeEntries = years.flatMap(y => allEntries[y]);
                
                const bsStart = calculateBalances(cumulativeEntries, coa, null, startBalDate, true);
                const bsEnd = calculateBalances(cumulativeEntries, coa, null, periodEnd, true);
                
                const isLedgerForCf = calculateBalances(cumulativeEntries, coa, periodStart, periodEnd);
                const rev = Object.values(isLedgerForCf).filter(a => a.type === '收入').reduce((sum, a) => sum + a.balance, 0);
                const cost = Object.values(isLedgerForCf).filter(a => a.type === '成本').reduce((sum, a) => sum + a.balance, 0);
                const exp = Object.values(isLedgerForCf).filter(a => a.type === '費用').reduce((sum, a) => sum + a.balance, 0);
                const nonRev = Object.values(isLedgerForCf).filter(a => a.type === '營業外收入').reduce((sum, a) => sum + a.balance, 0);
                const nonExp = Object.values(isLedgerForCf).filter(a => a.type === '營業外費損').reduce((sum, a) => sum + a.balance, 0);
                const periodNetIncome = (rev + nonRev) - (cost + exp + nonExp);
                
                const getChange = (a) => {
                    const s = bsStart[a.id] ? bsStart[a.id].balance : 0;
                    const e = bsEnd[a.id] ? bsEnd[a.id].balance : 0;
                    return e - s;
                };
                
                const f = hideZeroBalances ? (arr => arr.filter(a => a.change !== 0)) : (arr => arr);
                
                const cashAccounts = coa.filter(a => a.id.startsWith('11') && a.type === '資產');
                const begCash = cashAccounts.reduce((sum, a) => sum + (bsStart[a.id]?.balance || 0), 0);
                const endCash = cashAccounts.reduce((sum, a) => sum + (bsEnd[a.id]?.balance || 0), 0);
                
                const caChanges = f(coa.filter(a => a.type === '資產' && !a.id.startsWith('11') && (a.id.startsWith('12') || a.id.startsWith('13'))).map(a => ({ id: a.id, name: a.name, change: -getChange(a) })));
                const clChanges = f(coa.filter(a => a.type === '負債' && a.id.startsWith('21')).map(a => ({ id: a.id, name: a.name, change: getChange(a) })));
                const totalOpCash = periodNetIncome + caChanges.reduce((s, a) => s + a.change, 0) + clChanges.reduce((s, a) => s + a.change, 0);
                
                const invChanges = f(coa.filter(a => a.type === '資產' && (a.id.startsWith('14') || a.id.startsWith('15'))).map(a => ({ id: a.id, name: a.name, change: -getChange(a) })));
                const totalInvCash = invChanges.reduce((s, a) => s + a.change, 0);
                
                const longLiabChanges = coa.filter(a => a.type === '負債' && !a.id.startsWith('21')).map(a => ({ id: a.id, name: a.name, change: getChange(a) }));
                const eqChanges = coa.filter(a => a.type === '權益').map(a => ({ id: a.id, name: a.name, change: getChange(a) }));
                const finChanges = f([...longLiabChanges, ...eqChanges]);
                const totalFinCash = finChanges.reduce((s, a) => s + a.change, 0);
                
                const netCashChange = totalOpCash + totalInvCash + totalFinCash;
                
                return { begCash, endCash, netCashChange, periodNetIncome, caChanges, clChanges, invChanges, finChanges, totalOpCash, totalInvCash, totalFinCash };
            }, [allEntries, coa, cfFilter, cfCustomDates, currentYear, selectedYear, hideZeroBalances]);


            const PeriodSelector = ({ filter, setFilter, customDates, setCustomDates, label, mode = 'range' }) => (
                <div className="mb-4 space-y-2">
                    <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider">{label}</label>
                    <div className="flex flex-wrap gap-2 items-center">
                        <select 
                            className="border rounded-lg p-1.5 bg-gray-50 text-xs focus:ring-2 focus:ring-coffee-200 outline-none"
                            value={`${filter.type}-${filter.value}`}
                            onChange={(e) => {
                                const [type, value] = e.target.value.split('-');
                                setFilter({ type, value });
                            }}
                        >
                            <option value="all-">{mode === 'cutoff' ? '創店至今' : '全部期間'}</option>
                            <optgroup label={mode === 'cutoff' ? '截至月份' : '單月報表'}>
                                {[...Array(12)].map((_, i) => (
                                    <option key={i} value={`month-${i+1}`}>{mode === 'cutoff' ? `截至 ${i+1} 月底` : `${i+1} 月份`}</option>
                                ))}
                            </optgroup>
                            {mode === 'range' && (
                                <optgroup label="年初至今 (YTD)">
                                    {[...Array(12)].map((_, i) => (
                                        <option key={i} value={`ytd-${i+1}`}>年初到 {i+1} 月</option>
                                    ))}
                                </optgroup>
                            )}
                            <option value="full-year-">{mode === 'cutoff' ? `截至全年度 (${currentYear}) 底` : `全年度 (${currentYear})`}</option>
                            <option value="custom-">{mode === 'cutoff' ? '自訂截止日' : '自訂時間段'}</option>
                        </select>
                        {filter.type === 'custom' && (
                            <div className="flex gap-1 items-center">
                                {mode === 'range' && (
                                    <>
                                        <input type="date" className="border rounded p-1 text-[10px]" value={customDates.start} onChange={e => setCustomDates({...customDates, start: e.target.value})} />
                                        <span className="text-gray-300">-</span>
                                    </>
                                )}
                                <input type="date" className="border rounded p-1 text-[10px]" value={customDates.end} onChange={e => setCustomDates({...customDates, end: e.target.value})} />
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div>
                    <div className="flex gap-2 md:gap-4 mb-6 border-b border-gray-200">
                        <button 
                            onClick={() => setActiveReport('is')}
                            className={`px-4 py-3 font-bold text-base transition-all flex items-center gap-2 hover:bg-gray-50 rounded-t-lg ${activeReport === 'is' ? 'text-coffee-600 border-b-2 border-coffee-600 bg-coffee-50/50' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            📈 損益表
                        </button>
                        <button 
                            onClick={() => setActiveReport('bs')}
                            className={`px-4 py-3 font-bold text-base transition-all flex items-center gap-2 hover:bg-gray-50 rounded-t-lg ${activeReport === 'bs' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50/50' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            ⚖️ 資產負債表
                        </button>
                        <button 
                            onClick={() => setActiveReport('cf')}
                            className={`px-4 py-3 font-bold text-base transition-all flex items-center gap-2 hover:bg-gray-50 rounded-t-lg ${activeReport === 'cf' ? 'text-green-600 border-b-2 border-green-600 bg-green-50/50' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            💵 現金流量表
                        </button>
                        <div className="ml-auto flex items-center pr-2">
                            <label className="text-sm font-bold text-gray-500 cursor-pointer flex items-center gap-2 hover:text-gray-700 transition">
                                <input 
                                    type="checkbox" 
                                    checked={hideZeroBalances} 
                                    onChange={e => setHideZeroBalances(e.target.checked)}
                                    className="w-4 h-4 text-coffee-600 rounded-sm border-gray-300 focus:ring-coffee-500"
                                />
                                隱藏餘額為 0 的科目
                            </label>
                        </div>
                    </div>

                    <div className="animate-fade-in max-w-4xl mx-auto">
                        {/* 損益表卡片 */}
                        {activeReport === 'is' && (
                            <div className="card p-6 border border-coffee-100 shadow-sm">
                                <div className="flex justify-between items-start mb-4 border-b pb-2">
                                    <h3 className="text-xl font-bold text-coffee-700">損益表 (Income Statement)</h3>
                                </div>
                        
                        <PeriodSelector 
                            label="損益計算期間"
                            mode="range"
                            filter={isFilter} 
                            setFilter={setIsFilter} 
                            customDates={isCustomDates} 
                            setCustomDates={setIsCustomDates} 
                        />

                        <div className="space-y-2">
                            <div className="font-bold text-gray-700">營業收入</div>
                            {revenue.map(a => (
                                <div key={a.id} className="flex justify-between pl-4 text-sm">
                                    <span>{a.name}</span>
                                    <span>{a.balance.toLocaleString()}</span>
                                </div>
                            ))}
                            <div className="font-bold text-gray-700 mt-2">營業成本</div>
                            {cost.map(a => (
                                <div key={a.id} className="flex justify-between pl-4 text-sm">
                                    <span>{a.name}</span>
                                    <span>{a.balance.toLocaleString()}</span>
                                </div>
                            ))}
                            <div className="flex justify-between font-bold border-t pt-1 mt-1 text-gray-600">
                                <span>營業毛利</span>
                                <span>{grossProfit.toLocaleString()}</span>
                            </div>

                            <div className="font-bold text-gray-700 mt-4">營業費用</div>
                            {expense.map(a => (
                                <div key={a.id} className="flex justify-between pl-4 text-xs">
                                    <span>{a.name}</span>
                                    <span>{a.balance.toLocaleString()}</span>
                                </div>
                            ))}
                            <div className="flex justify-between font-bold border-t pt-1 mt-1 text-gray-600">
                                <span>營業利益</span>
                                <span>{opIncome.toLocaleString()}</span>
                            </div>

                            <div className="font-bold text-gray-700 mt-4">營業外收支</div>
                            {nonOpRevenue.map(a => (
                                <div key={a.id} className="flex justify-between pl-4 text-xs">
                                    <span>{a.name}</span>
                                    <span className="text-green-600">+{a.balance.toLocaleString()}</span>
                                </div>
                            ))}
                            {nonOpExpense.map(a => (
                                <div key={a.id} className="flex justify-between pl-4 text-xs">
                                    <span>{a.name}</span>
                                    <span className="text-red-600">-{a.balance.toLocaleString()}</span>
                                </div>
                            ))}

                            <div className="border-t-2 border-coffee-200 pt-2 mt-4 flex justify-between font-bold text-lg text-coffee-600">
                                <span>本期淨利</span>
                                <span>{isNetIncome.toLocaleString()}</span>
                            </div>
                        </div>
                            </div>
                        )}

                        {/* 資產負債表卡片 */}
                        {activeReport === 'bs' && (
                            <div className="card p-6 border border-blue-100 shadow-sm">
                                <div className="flex justify-between items-start mb-4 border-b pb-2">
                                    <h3 className="text-xl font-bold text-blue-700">資產負債表 (Balance Sheet)</h3>
                                </div>

                        <PeriodSelector 
                            label="結算截止日期"
                            mode="cutoff"
                            filter={bsFilter} 
                            setFilter={setBsFilter} 
                            customDates={bsCustomDates} 
                            setCustomDates={setBsCustomDates} 
                        />
