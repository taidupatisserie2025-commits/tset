        function AssetsView({ assets, setAssets, selectedYear, setSelectedYear, depreciationLog, setDepreciationLog }) {
            const [isAdding, setIsAdding] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState({ totalCost: 0, quantity: 1 });
            const [remarkAssetId, setRemarkAssetId] = useState(null);
            const [tempRemark, setTempRemark] = useState('');
            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth() + 1); // 1-12
            const [isDetailModalOpen, setIsDetailModalOpen] = useState(false);

            const currentKey = `${selectedYear}-${selectedMonth}`;
            const isRecorded = depreciationLog[currentKey] || false;

            const toggleRecorded = () => {
                setDepreciationLog(prev => ({
                    ...prev,
                    [currentKey]: !isRecorded
                }));
            };

            const [formData, setFormData] = useState({
                id: crypto.randomUUID(),
                status: '使用中', // 使用中, 已售出, 閒置
                category: '生財設備', // 生財設備, 裝修工程, 辦公設備, 運輸設備
                name: '',
                purchaseDate: `${selectedYear}-${String(new Date().getMonth() + 1).padStart(2, '0')}-${String(new Date().getDate()).padStart(2, '0')}`,
                totalCost: 0,
                quantity: 1,
                usefulLife: 5,
                residualValue: 0,
                remark: ''
            });

            // 當切換年度時，更新新增資產的預設日期
            useEffect(() => {
                const today = new Date();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                setFormData(prev => ({ ...prev, purchaseDate: `${selectedYear}-${mm}-${dd}` }));
            }, [selectedYear]);

            const calculateAssetDetails = (asset, targetYear, targetMonth) => {
                const purchaseDate = new Date(asset.purchaseDate);
                const endDate = new Date(purchaseDate);
                endDate.setFullYear(purchaseDate.getFullYear() + asset.usefulLife);
                
                const targetDate = new Date(targetYear, targetMonth, 0); // 指定年月底
                
                // 計算每月折舊 (總價 - 殘值) / (年 * 12)
                const totalMonths = asset.usefulLife * 12;
                const monthlyDepreciation = totalMonths > 0 ? (asset.totalCost - asset.residualValue) / totalMonths : 0;
                const unitMonthlyDepreciation = asset.quantity > 0 ? monthlyDepreciation / asset.quantity : 0;

                // 計算截至指定日期的已使用月數
                let monthsUsed = (targetDate.getFullYear() - purchaseDate.getFullYear()) * 12 + (targetDate.getMonth() - purchaseDate.getMonth());
                if (targetDate.getDate() < purchaseDate.getDate()) monthsUsed--;
                monthsUsed = Math.max(0, monthsUsed);

                let accumulatedDepreciation = Math.min(asset.totalCost - asset.residualValue, monthlyDepreciation * monthsUsed);
                
                const bookValue = asset.totalCost - accumulatedDepreciation;
                
                let depStatus = '折舊中';
                if (asset.status === '已售出') depStatus = '停止折舊';
                else if (bookValue <= asset.residualValue || monthsUsed >= totalMonths) depStatus = '折舊結束';
                else if (targetDate < purchaseDate) depStatus = '尚未開始';

                return {
                    endDate: endDate.toISOString().split('T')[0],
                    monthly: Math.round(monthlyDepreciation),
                    unitMonthly: Math.round(unitMonthlyDepreciation),
                    accumulated: Math.round(accumulatedDepreciation),
                    bookValue: Math.round(bookValue),
                    depStatus
                };
            };

            const currentYear = selectedYear;
            
            // 計算各類別與總折舊額
            const depreciationStats = useMemo(() => {
                const stats = {
                    '生財設備': 0,
                    '裝修工程': 0,
                    '辦公設備': 0,
                    '運輸設備': 0,
                    'total': 0
                };

                assets.forEach(asset => {
                    if (asset.status === '已售出') return;
                    
                    const purchaseDate = new Date(asset.purchaseDate);
                    const endDate = new Date(purchaseDate);
                    endDate.setFullYear(purchaseDate.getFullYear() + asset.usefulLife);
                    
                    const monthFirstDay = new Date(selectedYear, selectedMonth - 1, 1);
                    const monthLastDay = new Date(selectedYear, selectedMonth, 0);
                    
                    if (purchaseDate <= monthLastDay && endDate >= monthFirstDay) {
                        const totalMonths = asset.usefulLife * 12;
                        const monthlyDep = totalMonths > 0 ? (asset.totalCost - asset.residualValue) / totalMonths : 0;
                        
                        if (stats[asset.category] !== undefined) {
                            stats[asset.category] += monthlyDep;
                        }
                        stats.total += monthlyDep;
                    }
                });
                return stats;
            }, [assets, selectedMonth, selectedYear]);

            const monthlyTotalDepreciation = depreciationStats.total;

            const handleSubmit = (e) => {
                e.preventDefault();
                setAssets([...assets, { ...formData, id: crypto.randomUUID() }]);
                setIsAdding(false);

                    id: crypto.randomUUID(),
                    status: '使用中',
                    category: '生財設備',
                    name: '',

            const deleteAsset = (id) => {

            const updateAssetStatus = (id, newStatus) => {

            };

            const startEditing = (asset) => {
                setEditingId(asset.id);
                setEditData({ totalCost: asset.totalCost, quantity: asset.quantity });
            };

            const saveEdit = () => {

            };

            const openRemark = (asset) => {

            };

            const saveRemark = () => {
                setAssets(assets.map(a => a.id === remarkAssetId ? { ...a, remark: tempRemark } : a));

            const setPeriodToNow = () => {
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth() + 1;
                
                // 限制在支援的年度範圍內 (2026-2031)

                setSelectedMonth(month);

                                    <span className="text-xs font-bold text-coffee-400">查詢期間:</span>
                                    <div className="flex items-center gap-1">
                                        <select 
                                            value={selectedYear} 
                                            onChange={(e) => setSelectedYear(Number(e.target.value))}
                                            className="bg-white border border-coffee-200 rounded-lg px-2 py-1 text-sm font-bold text-coffee-700 outline-none focus:ring-2 focus:ring-coffee-300"
                                        >
                                            {[2026, 2027, 2028, 2029, 2030, 2031].map(y => (
                                                <option key={y} value={y}>{y} 年</option>
                                            ))}
                                        </select>
                                        <select 
                                            value={selectedMonth} 
                                            onChange={(e) => setSelectedMonth(Number(e.target.value))}

                                        <button 
                                            onClick={setPeriodToNow}

                                <div className="flex items-center gap-2">

                                    <button

        function ExportModal({ onClose, allEntries, coa, selectedYear }) {
            const [contentType, setContentType] = useState('journal'); // journal, is, bs, raw
            const [format, setFormat] = useState('pdf'); // pdf, excel, json
            const currentYear = selectedYear;
            const entries = allEntries[selectedYear] || [];

            const handleExport = () => {
                if (contentType === 'raw') {
                    const blob = new Blob([JSON.stringify(allEntries, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `dessert_full_backup_${new Date().toISOString().split('T')[0]}.json`;
                    a.click();
                    onClose();
                    return;
                }

                if (format === 'excel') {
                    exportToExcel();
                } else {
                    exportToPdf();
                }
                onClose();
            };

            const exportToExcel = () => {
                let data = [];
                let filename = '';

                if (contentType === 'journal') {
                    filename = `${currentYear}年度_普通日記簿`;
                    entries.forEach(entry => {
                        entry.lines.forEach((line, idx) => {
                            data.push({
                                '傳票編號': idx === 0 ? entry.id : '',
                                '日期': idx === 0 ? entry.date : '',
                                '總摘要': idx === 0 ? entry.description : '',
                                '會計科目': line.accountName,
                                '摘要': line.lineDescription || '',
                                '借方': line.type === 'debit' ? line.amount : 0,
                                '貸方': line.type === 'credit' ? line.amount : 0
                            });
                        });
                    });
                } else if (contentType === 'is') {
                    filename = `${currentYear}年度_損益表`;
                    const balances = calculateBalances(entries, coa, new Date(currentYear, 0, 1), new Date(currentYear, 11, 31));
                    const revenue = Object.values(balances).filter(a => a.type === '收入');
                    const cost = Object.values(balances).filter(a => a.type === '成本');
                    const expense = Object.values(balances).filter(a => a.type === '費用');
                    const nonOpRev = Object.values(balances).filter(a => a.type === '營業外收入');
                    const nonOpExp = Object.values(balances).filter(a => a.type === '營業外費損');

                    const totalRev = revenue.reduce((s, a) => s + a.balance, 0);
                    const totalCost = cost.reduce((s, a) => s + a.balance, 0);
                    const totalExp = expense.reduce((s, a) => s + a.balance, 0);
                    const totalNonOp = nonOpRev.reduce((s, a) => s + a.balance, 0) - nonOpExp.reduce((s, a) => s + a.balance, 0);

                    data.push({ '項目': '營業收入', '金額': totalRev });
                    revenue.forEach(a => data.push({ '項目': `  ${a.name}`, '金額': a.balance }));
                    data.push({ '項目': '營業成本', '金額': totalCost });
                    cost.forEach(a => data.push({ '項目': `  ${a.name}`, '金額': a.balance }));
                    data.push({ '項目': '營業毛利', '金額': totalRev - totalCost });
                    data.push({ '項目': '營業費用', '金額': totalExp });
                    expense.forEach(a => data.push({ '項目': `  ${a.name}`, '金額': a.balance }));
                    data.push({ '項目': '營業利益', '金額': totalRev - totalCost - totalExp });
                    data.push({ '項目': '營業外收支', '金額': totalNonOp });
                    data.push({ '項目': '本期淨利', '金額': totalRev - totalCost - totalExp + totalNonOp });
                } else {
                    filename = `${currentYear}年度_資產負債表`;
                    const years = Object.keys(allEntries).map(Number).filter(y => y <= selectedYear).sort();
                    const cumulativeEntries = years.flatMap(y => allEntries[y]);
                    const balances = calculateBalances(cumulativeEntries, coa, null, new Date(currentYear, 11, 31), true);
                    const assets = Object.values(balances).filter(a => a.type === '資產');
                    const liabilities = Object.values(balances).filter(a => a.type === '負債');
                    const equity = Object.values(balances).filter(a => a.type === '權益');
                    const netIncome = Object.values(balances).filter(a => ['收入', '成本', '費用', '營業外收入', '營業外費損'].includes(a.type))
                        .reduce((s, a) => a.side === 'credit' ? s + a.balance : s - a.balance, 0);

                    data.push({ '類別': '資產', '科目': '', '金額': assets.reduce((s, a) => s + a.balance, 0) });
                    assets.forEach(a => data.push({ '類別': '', '科目': a.name, '金額': a.balance }));
                    data.push({ '類別': '負債', '科目': '', '金額': liabilities.reduce((s, a) => s + a.balance, 0) });
                    liabilities.forEach(a => data.push({ '類別': '', '科目': a.name, '金額': a.balance }));
                    data.push({ '類別': '權益', '科目': '', '金額': equity.reduce((s, a) => s + a.balance, 0) + netIncome });
                    equity.forEach(a => data.push({ '類別': '', '科目': a.name, '金額': a.balance }));
                    data.push({ '類別': '', '科目': '累積淨利', '金額': netIncome });
                }

                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "報表");
                XLSX.writeFile(wb, `${filename}_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const exportToPdf = () => {
                const element = document.createElement('div');
                element.className = 'p-8 bg-white text-gray-800 font-sans';
                
                let title = contentType === 'journal' ? '普通日記簿' : (contentType === 'is' ? '損益表' : '資產負債表');
                let html = `<h1 class="text-3xl font-bold mb-2 text-center text-gray-900">態度貳貳 - ${title}</h1>`;
                html += `<p class="text-center text-sm text-gray-500 mb-6">年度：${currentYear} | 列印日期：${new Date().toLocaleDateString()}</p>`;

                if (contentType === 'journal') {
                    html += `
                        <table class="w-full border-collapse border border-gray-300 text-xs">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700">
                                    <th class="border border-gray-300 p-2 w-24">日期/編號</th>
                                    <th class="border border-gray-300 p-2 w-32">總摘要</th>
                                    <th class="border border-gray-300 p-2">會計科目 / 摘要</th>
                                    <th class="border border-gray-300 p-2 text-right w-20">借方</th>
                                    <th class="border border-gray-300 p-2 text-right w-20">貸方</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${entries.map(e => `
                                    <tr>
                                        <td class="border border-gray-300 p-2 align-top">
                                            <div class="font-bold">${e.date}</div>
                                            <div class="text-[10px] text-coffee-600 font-mono">#${e.id}</div>
                                        </td>
                                        <td class="border border-gray-300 p-2 align-top text-gray-600">${e.description}</td>
                                        <td class="border border-gray-300 p-0" colspan="3">
                                            <table class="w-full border-none">
                                                ${e.lines.map(l => `
                                                    <tr>
                                                        <td class="p-2 border-b border-gray-100 text-gray-800">
                                                            <div class="font-medium ${l.type === 'credit' ? 'pl-4' : ''}">${l.accountName}</div>
                                                            <div class="text-[10px] text-gray-400 italic">${l.lineDescription || ''}</div>
                                                        </td>
                                                        <td class="p-2 border-b border-gray-100 text-right w-20 font-mono">${l.type === 'debit' ? l.amount.toLocaleString() : ''}</td>
                                                        <td class="p-2 border-b border-gray-100 text-right w-20 font-mono">${l.type === 'credit' ? l.amount.toLocaleString() : ''}</td>
                                                    </tr>
                                                `).join('')}
                                            </table>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else if (contentType === 'is') {
                    const balances = calculateBalances(entries, coa, new Date(currentYear, 0, 1), new Date(currentYear, 11, 31));
                    const revenue = Object.values(balances).filter(a => a.type === '收入');
                    const cost = Object.values(balances).filter(a => a.type === '成本');
                    const expense = Object.values(balances).filter(a => a.type === '費用');
                    const nonOpRev = Object.values(balances).filter(a => a.type === '營業外收入');
                    const nonOpExp = Object.values(balances).filter(a => a.type === '營業外費損');

                    const totalRev = revenue.reduce((s, a) => s + a.balance, 0);
                    const totalCost = cost.reduce((s, a) => s + a.balance, 0);
                    const totalExp = expense.reduce((s, a) => s + a.balance, 0);
                    const totalNonOp = nonOpRev.reduce((s, a) => s + a.balance, 0) - nonOpExp.reduce((s, a) => s + a.balance, 0);

                    const row = (label, value, isBold = false, indent = false) => `
                        <tr class="${isBold ? 'font-bold bg-gray-50' : ''}">
                            <td class="border border-gray-300 p-2 ${indent ? 'pl-8' : ''}">${label}</td>
                            <td class="border border-gray-300 p-2 text-right font-mono">${value.toLocaleString()}</td>
                        </tr>
                    `;

                    html += `
                        <table class="w-full max-w-2xl mx-auto border-collapse border border-gray-300 text-sm">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700">
                                    <th class="border border-gray-300 p-2 text-left">項目</th>
                                    <th class="border border-gray-300 p-2 text-right">金額 (TWD)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${row('營業收入', totalRev, true)}
                                ${revenue.map(a => row(a.name, a.balance, false, true)).join('')}
                                ${row('營業成本', totalCost, true)}
                                ${cost.map(a => row(a.name, a.balance, false, true)).join('')}
                                ${row('營業毛利', totalRev - totalCost, true)}
                                ${row('營業費用', totalExp, true)}
                                ${expense.map(a => row(a.name, a.balance, false, true)).join('')}
                                ${row('營業利益', totalRev - totalCost - totalExp, true)}
                                ${row('營業外收支淨額', totalNonOp, true)}
                                ${row('本期淨利', totalRev - totalCost - totalExp + totalNonOp, true)}
                            </tbody>
                        </table>
                    `;
                } else {
                    const years = Object.keys(allEntries).map(Number).filter(y => y <= selectedYear).sort();
                    const cumulativeEntries = years.flatMap(y => allEntries[y]);
                    const balances = calculateBalances(cumulativeEntries, coa, null, new Date(currentYear, 11, 31), true);
                    const assets = Object.values(balances).filter(a => a.type === '資產');
                    const liabilities = Object.values(balances).filter(a => a.type === '負債');
                    const equity = Object.values(balances).filter(a => a.type === '權益');
                    const netIncome = Object.values(balances).filter(a => ['收入', '成本', '費用', '營業外收入', '營業外費損'].includes(a.type))
                        .reduce((s, a) => a.side === 'credit' ? s + a.balance : s - a.balance, 0);

                    const section = (title, items, total) => `
                        <tr class="bg-blue-50 font-bold"><td class="border border-gray-300 p-2" colspan="2">${title}</td></tr>
                        ${items.map(a => `<tr><td class="border border-gray-300 p-2 pl-8">${a.name}</td><td class="border border-gray-300 p-2 text-right font-mono">${a.balance.toLocaleString()}</td></tr>`).join('')}
                        ${title === '權益' ? `<tr><td class="border border-gray-300 p-2 pl-8">本期淨利 (累積)</td><td class="border border-gray-300 p-2 text-right font-mono">${netIncome.toLocaleString()}</td></tr>` : ''}
                        <tr class="font-bold"><td class="border border-gray-300 p-2 text-right">${title}總計</td><td class="border border-gray-300 p-2 text-right font-mono">${total.toLocaleString()}</td></tr>
                    `;

                    html += `
                        <table class="w-full max-w-2xl mx-auto border-collapse border border-gray-300 text-sm">
                            <thead>
                                <tr class="bg-gray-100 text-gray-700">
                                    <th class="border border-gray-300 p-2 text-left">會計科目</th>
                                    <th class="border border-gray-300 p-2 text-right">金額 (TWD)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${section('資產', assets, assets.reduce((s, a) => s + a.balance, 0))}
                                ${section('負債', liabilities, liabilities.reduce((s, a) => s + a.balance, 0))}
                                ${section('權益', equity, equity.reduce((s, a) => s + a.balance, 0) + netIncome)}
                            </tbody>
                        </table>
                    `;
                }

                element.innerHTML = html;
                document.body.appendChild(element);

                const opt = {
                    margin: 0.5,
                    filename: `${title}_${currentYear}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    document.body.removeChild(element);
                });
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-fade-in-up">
                        <div className="p-6 border-b border-coffee-50 flex justify-between items-center bg-coffee-50">
                            <h3 className="text-xl font-bold text-coffee-600">匯出中心</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 transition text-2xl">✕</button>
                        </div>
                        
                        <div className="p-6 space-y-6">
                            <section>
                                <label className="block text-sm font-bold text-gray-500 mb-3 uppercase tracking-widest">1. 選擇匯出內容</label>
                                <div className="grid grid-cols-2 gap-3">
                                    {[
                                        { id: 'journal', label: '普通日記簿', icon: '📝' },
                                        { id: 'is', label: '損益表', icon: '📈' },
                                        { id: 'bs', label: '資產負債表', icon: '⚖️' },
                                        { id: 'raw', label: '原始資料(備份)', icon: '💾' }
                                    ].map(item => (
                                        <button 
                                            key={item.id}
                                            onClick={() => setContentType(item.id)}
                                            className={`p-3 rounded-xl border-2 transition text-left flex flex-col gap-1 ${contentType === item.id ? 'border-coffee-600 bg-coffee-50' : 'border-gray-100 hover:border-coffee-200'}`}
                                        >
                                            <span className="text-xl">{item.icon}</span>
                                            <span className={`text-sm font-medium ${contentType === item.id ? 'text-coffee-700' : 'text-gray-600'}`}>{item.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section>
                                <label className="block text-sm font-bold text-gray-500 mb-3 uppercase tracking-widest">2. 選擇檔案格式</label>
                                <div className="flex gap-4">
                                    {contentType === 'raw' ? (
                                        <div className="flex-1 p-3 rounded-xl border-2 border-coffee-600 bg-coffee-50 flex items-center gap-3">
                                            <span className="text-xl">📄</span>
                                            <span className="text-sm font-medium text-coffee-700">JSON 格式</span>
                                        </div>
                                    ) : (
                                        <>
                                            <button 
                                                onClick={() => setFormat('pdf')}
                                                className={`flex-1 p-3 rounded-xl border-2 transition flex items-center gap-3 ${format === 'pdf' ? 'border-coffee-600 bg-coffee-50' : 'border-gray-100 hover:border-coffee-200'}`}
                                            >
                                                <span className="text-xl">📕</span>
                                                <span className={`text-sm font-medium ${format === 'pdf' ? 'text-coffee-700' : 'text-gray-600'}`}>PDF 報表</span>
                                            </button>
                                            <button 
                                                onClick={() => setFormat('excel')}
                                                className={`flex-1 p-3 rounded-xl border-2 transition flex items-center gap-3 ${format === 'excel' ? 'border-coffee-600 bg-coffee-50' : 'border-gray-100 hover:border-coffee-200'}`}
                                            >
                                                <span className="text-xl">📊</span>
                                                <span className={`text-sm font-medium ${format === 'excel' ? 'text-coffee-700' : 'text-gray-600'}`}>Excel 試算表</span>
                                            </button>
                                        </>
                                    )}
                                </div>
                            </section>

                            <button 
                                onClick={handleExport}
                                className="w-full py-4 bg-coffee-600 text-white rounded-xl font-bold text-lg shadow-lg hover:bg-coffee-700 transition-all active:scale-[0.98] mt-4"
                            >
                                開始匯出 🚀
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
